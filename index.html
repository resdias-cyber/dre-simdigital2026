<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Protected Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <style>
            .staticrypt-html { height: 100%; }
            .staticrypt-body { height: 100%; margin: 0; }
            .staticrypt-content {
                height: 100%;
                margin-bottom: 1em;
                background: linear-gradient(135deg, #060a12 0%, #0d1526 50%, #0a1628 100%);
                font-family: 'Inter', sans-serif;
                -webkit-font-smoothing: antialiased;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .staticrypt-page {
                width: 420px;
                padding: 0;
                margin: auto;
                box-sizing: border-box;
            }
            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: rgba(13,21,38,.85);
                border: 1px solid rgba(30,58,95,.5);
                border-radius: 20px;
                max-width: 420px;
                margin: 0 auto;
                padding: 48px 40px 40px;
                box-shadow: 0 0 60px rgba(0,212,170,.04);
                backdrop-filter: blur(20px);
            }
            .staticrypt-brand {
                font-family: 'Syne', sans-serif;
                font-size: 32px;
                font-weight: 800;
                color: #fff;
                letter-spacing: 2px;
                
                margin-bottom: 6px;
            }
            .staticrypt-sub {
                font-size: 11px;
                color: rgba(226,232,240,.4);
                letter-spacing: 2px;
                text-transform: uppercase;
                margin-bottom: 8px;
            }
            .staticrypt-accent-line {
                width: 60px;
                height: 2px;
                background: linear-gradient(90deg, #00d4aa, #a855f7);
                margin: 0 0 32px;
                border-radius: 1px;
            }
            .staticrypt-label {
                display: block;
                font-size: 10px;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: rgba(226,232,240,.5);
                margin-bottom: 8px;
                text-align: left;
            }
            .staticrypt-password-container {
                position: relative;
                background: rgba(10,22,40,.6);
                border: 1px solid rgba(30,58,95,.6);
                border-radius: 10px;
                margin: 0 0 20px;
                box-sizing: border-box;
                transition: border-color .2s;
            }
            .staticrypt-password-container:focus-within {
                border-color: rgba(0,212,170,.4);
            }
            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: transparent;
                border: 0;
                box-sizing: border-box;
                font-size: 14px;
                font-family: 'Inter', sans-serif;
                color: #e2e8f0;
                outline: 0;
                padding: 14px 40px 14px 16px;
                width: 100%;
            }
            .staticrypt-form input::placeholder { color: rgba(226,232,240,.25); }
            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                opacity: 40%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                filter: invert(1);
            }
            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: linear-gradient(135deg, #e8461e 0%, #f5a623 100%);
                width: 100%;
                border: 0;
                border-radius: 10px;
                padding: 14px;
                color: #ffffff;
                font-size: 13px;
                font-family: 'Syne', sans-serif;
                font-weight: 700;
                letter-spacing: 2px;
                cursor: pointer;
                transition: filter .2s, transform .1s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover { filter: brightness(110%); transform: translateY(-1px); }
            .staticrypt-form .staticrypt-decrypt-button:active { transform: translateY(0); }
            .staticrypt-hr {
                margin: 24px 0 16px;
                border: 0;
                border-top: 1px solid rgba(30,58,95,.4);
            }
            .staticrypt-footer {
                text-align: center;
                font-size: 9px;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: rgba(226,232,240,.25);
            }
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 16px;
                cursor: pointer;
                font-size: 11px;
                color: rgba(226,232,240,.4);
            }
            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
                margin-right: 10px;
                accent-color: #f5a623;
            }
            .hidden { display: none !important; }
            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #060a12;
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.2em solid rgba(0,212,170,.2);
                border-right-color: #00d4aa;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }
            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"], input[type="text"] { font-size: 16px; }
            }
        </style>
    </head>
